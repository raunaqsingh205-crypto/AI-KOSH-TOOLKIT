version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tkt_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aikosh_quality
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: tkt_redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: tkt_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tkt_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aikosh_quality
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=aikosh-datasets
      - S3_REGION=us-east-1
      - API_KEY_SECRET=tkt_secret_super_secure_key_12345678
      - JWT_SECRET=supersecretjwtsessionkeychangeinproduction123456!
      - AIKOSH_WEBHOOK_URL=
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis
      - minio

  worker_assessment:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tkt_worker_assessment
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aikosh_quality
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=aikosh-datasets
      - S3_REGION=us-east-1
      - API_KEY_SECRET=tkt_secret_super_secure_key_12345678
      - JWT_SECRET=supersecretjwtsessionkeychangeinproduction123456!
      - AIKOSH_WEBHOOK_URL=
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
    command: celery -A app.worker.celery_app:celery_app worker -Q assessment -c 4 --loglevel=info
    depends_on:
      - postgres
      - redis
      - minio

  worker_webhook:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tkt_worker_webhook
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aikosh_quality
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=aikosh-datasets
      - S3_REGION=us-east-1
      - API_KEY_SECRET=tkt_secret_super_secure_key_12345678
      - JWT_SECRET=supersecretjwtsessionkeychangeinproduction123456!
      - AIKOSH_WEBHOOK_URL=
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
    command: celery -A app.worker.celery_app:celery_app worker -Q webhook -c 2 --loglevel=info
    depends_on:
      - redis

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tkt_flower
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    command: celery -A app.worker.celery_app:celery_app flower --port=5555
    depends_on:
      - redis

  frontend:
    image: node:18-alpine
    container_name: tkt_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: "npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend



volumes:
  postgres_data:
  minio_data:
